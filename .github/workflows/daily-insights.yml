name: Daily Insights Collection

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  collect-and-sync:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.OV_GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.OV_GITHUB_TOKEN }}
      LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
      LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
      LARK_BASE_TOKEN: ${{ secrets.LARK_BASE_TOKEN }}
      LARK_TABLE_ID: ${{ secrets.LARK_TABLE_ID }}
      LARK_TRENDS_TABLE_ID: ${{ secrets.LARK_TRENDS_TABLE_ID }}
      LARK_OPENVIKING_TRAFFIC_TABLE_ID: ${{ secrets.LARK_OPENVIKING_TRAFFIC_TABLE_ID }}
      LARK_OPENVIKING_FUNNEL_TABLE_ID: ${{ secrets.LARK_OPENVIKING_FUNNEL_TABLE_ID }}
      LARK_IDENTITY: bot
      OV_GH_PREFER_ENV: '1'
      WRITE_ENV_UPDATES: '0'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set Up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Python Dependencies
      run: |
        pip install -r requirements.txt

    - name: Install Lark CLI
      run: |
        npm install -g @larksuite/cli
        lark-cli --version

    - name: Configure Lark CLI
      if: ${{ env.LARK_APP_ID != '' && env.LARK_APP_SECRET != '' }}
      run: |
        lark-cli config init \
          --app-id "$LARK_APP_ID" \
          --app-secret "$LARK_APP_SECRET" \
          --brand feishu

    - name: Validate Required Secrets
      run: |
        test -n "$GITHUB_TOKEN"

    - name: Run Daily Pipeline
      run: |
        bash ./run_github_actions.sh

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: insights-data
        path: |
          data/*.json
          data/github-traffic/**/*.json
          logs/**
        retention-days: 30

    - name: Failure Summary
      if: failure()
      run: |
        echo "❌ Daily insights collection failed!"
        echo "Please check the logs for details."
